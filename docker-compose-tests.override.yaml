services:
  postgres-data-test:
    expose:
      - 5432
    environment:
      - POSTGRES_DB=budgeting_tests
      - POSTGRES_USER=budgeting_tests
      - POSTGRES_PASSWORD=mypass

  api-functional-tests:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:80
      LOCAL_CONNECTION_STRING: Host=postgres-data-test;Port=5432;Username=budgeting_tests;Password=mypass;Database=budgeting_tests;
    entrypoint:
      - dotnet
      - test
      - --no-restore
      - --configuration
      - Release
      - --report-xunit-trx
      - --report-xunit-trx-filename
      - test-results.functional.xml
      - --results-directory
      - /TestResults

  api-unit-tests:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
    entrypoint:
      - dotnet
      - test
      - --no-restore
      - --configuration
      - Release
      - --report-xunit-trx
      - --report-xunit-trx-filename
      - test-results.unit.xml
      - --results-directory
      - /TestResults
